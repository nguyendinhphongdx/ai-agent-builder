services:
  mail:
    image: agentforge-mail:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-mail
    restart: unless-stopped
    environment:
      - PORT=3011
      - NODE_ENV=production
      - MAIL_DRIVER=${MAIL_DRIVER:-sendgrid}
      - MAIL_FROM=${MAIL_FROM:-noreply@agentforge.com}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-AgentForge}
      # SendGrid
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      # SMTP
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
    ports:
      - '3011:3011'
    networks:
      - agentforge
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3011/health']
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  agentforge:
    external: true