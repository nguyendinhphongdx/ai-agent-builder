services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    container_name: agentforge-postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentforge

volumes:
  pgdata:

networks:
  agentforge:
    name: agentforge
