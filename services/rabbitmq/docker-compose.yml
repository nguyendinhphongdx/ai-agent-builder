services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: agentforge-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file: .env
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - agentforge

volumes:
  rabbitmqdata:

networks:
  agentforge:
    name: agentforge
    external: true
