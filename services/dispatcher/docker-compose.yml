services:
  dispatcher:
    image: agentforge-dispatcher:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-dispatcher
    restart: unless-stopped
    environment:
      - PORT=3010
      - NODE_ENV=${NODE_ENV:-production}
      # Auth — required when NODE_ENV=production. Empty in dev disables guard.
      - DISPATCHER_SECRET=${DISPATCHER_SECRET:-}
      # RabbitMQ — hardcoded hostname (rabbitmq = service name in agentforge network).
      # NOT using ${RABBITMQ_URL:-...} because .env has the localhost variant for
      # local dev and would override this in docker context.
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      # HTTP client
      - HTTP_TIMEOUT=${HTTP_TIMEOUT:-30000}
      # Retry defaults
      - RETRY_MAX_ATTEMPTS=${RETRY_MAX_ATTEMPTS:-3}
      - RETRY_BACKOFF_MS=${RETRY_BACKOFF_MS:-1000}
      - RETRY_BACKOFF_MULTIPLIER=${RETRY_BACKOFF_MULTIPLIER:-2}
      # Service URL overrides (empty → fall back to routes.json)
      - BACKEND_URL=http://host.docker.internal:8000
      - MAIL_URL=${MAIL_URL:-}
      - SOCKET_URL=${SOCKET_URL:-}
      - CODE_SANDBOX_URL=${CODE_SANDBOX_URL:-}
    ports:
      - '3010:3010'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - agentforge
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--tries=1',
          '--spider',
          'http://localhost:3010/health',
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  agentforge:
    name: agentforge
