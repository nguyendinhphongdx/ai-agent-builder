services:
  code-sandbox:
    image: agentforge-sandbox:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentforge-sandbox
    ports:
      - "8100:8000"
    networks:
      - agentforge
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

networks:
  agentforge:
    name: agentforge
